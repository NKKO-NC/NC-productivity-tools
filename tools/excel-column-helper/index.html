<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 相對欄位對照</title>
  <meta name="theme-color" content="#b96a1d" />
  <meta name="description" content="Excel 相對欄位對照工具，可將欄位區間轉成從 1 開始的相對序號，並可獨立安裝成 PWA。" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="../../assets/icons/app-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../assets/css/site.css" />
</head>
<body>
  <div class="page-shell tool-page">
    <header class="topbar">
      <div class="brand" data-i18n="brand">Excel 工具</div>
      <div class="topbar-actions">
        <a class="link-button button-soft" href="../../index.html" data-i18n="backHome">回到首頁</a>
        <button class="button button-primary pwa-install" type="button" data-install-pwa data-i18n="installPwa" hidden>安裝 App</button>
        <button class="button button-soft" type="button" data-language-toggle>EN</button>
        <div class="theme-switcher" id="themeSwitcher">
          <button
            class="button button-soft theme-trigger"
            type="button"
            id="themeTrigger"
            aria-controls="themePanel"
            aria-expanded="false"
            data-i18n-aria-label="themeToggleAria"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Z" fill="currentColor"></path>
              <path d="M19.43 12.98a7.9 7.9 0 0 0 .05-.98a7.9 7.9 0 0 0-.05-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.69-.98l-.38-2.65A.5.5 0 0 0 14 1h-4a.5.5 0 0 0-.49.42l-.38 2.65a7.28 7.28 0 0 0-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65a7.9 7.9 0 0 0-.05.98a7.9 7.9 0 0 0 .05.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65A.5.5 0 0 0 10 23h4a.5.5 0 0 0 .49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64ZM12 17a5 5 0 1 1 0-10a5 5 0 0 1 0 10Z" fill="currentColor"></path>
            </svg>
          </button>
          <div class="theme-panel" id="themePanel" hidden>
            <p class="theme-title" data-i18n="themeTitle">主題</p>
            <div class="theme-options">
              <button class="theme-option" type="button" data-theme-option="sunset" data-i18n="themeSunset">預設橘</button>
              <button class="theme-option" type="button" data-theme-option="ocean" data-i18n="themeOcean">海藍</button>
              <button class="theme-option" type="button" data-theme-option="meadow" data-i18n="themeMeadow">草綠</button>
              <button class="theme-option" type="button" data-theme-option="rainbow" data-i18n="themeRainbow">彩虹</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="tool-section">
      <div class="eyebrow" data-i18n="eyebrow">Excel 小工具</div>
      <h1 data-i18n="title">Excel 相對欄位對照</h1>
      <p class="tool-intro" data-i18n-html="intro">
        輸入起始與結束欄位，例如 <strong>W</strong> 到 <strong>Z</strong>，工具會回傳範圍內從 1 開始的相對序號。
      </p>
      <div class="tool-tag-row">
        <span class="tag-pill">#PWA</span>
        <span class="tag-pill">#HTML</span>
        <span class="tag-pill">#VanillaJS</span>
        <span class="tag-pill">#Excel</span>
        <span class="tag-pill">#Offline</span>
      </div>

      <div class="form-grid">
        <div class="field">
          <label for="start" data-i18n="startLabel">起始欄位</label>
          <input id="start" maxlength="3" autocomplete="off" data-i18n-placeholder="startPlaceholder" placeholder="例如 W" />
        </div>
        <div class="field">
          <label for="end" data-i18n="endLabel">結束欄位</label>
          <input id="end" maxlength="3" autocomplete="off" data-i18n-placeholder="endPlaceholder" placeholder="例如 Z" />
        </div>
      </div>

      <div class="tool-actions">
        <button class="button button-primary" type="button" id="generateButton" data-i18n="generate">產生對照表</button>
        <button class="button button-soft" type="button" id="resetButton" data-i18n="reset">重設</button>
      </div>

      <div class="message" id="message" aria-live="polite"></div>
      <div class="result" id="result"></div>

      <section class="quick-lookup" id="quickLookup" hidden>
        <div class="quick-lookup-head">
          <h2 data-i18n="quickLookupTitle">速查</h2>
          <p class="helper-text" data-i18n="quickLookupIntro">輸入單一欄位，直接回傳目前對照表中的相對編號；若不在範圍內，會顯示不在範圍內。</p>
        </div>
        <div class="quick-lookup-form">
          <div class="field">
            <label for="lookup" data-i18n="quickLookupLabel">查詢欄位</label>
            <input id="lookup" maxlength="3" autocomplete="off" data-i18n-placeholder="quickLookupPlaceholder" placeholder="例如 Y" />
          </div>
          <button class="button button-soft" type="button" id="lookupButton" data-i18n="quickLookupAction">速查編號</button>
        </div>
        <div class="quick-lookup-result" id="quickLookupResult" aria-live="polite"></div>
      </section>

      <p class="footer-note" data-i18n="footnote">
        支援 A 到 XFD，結果會依你輸入的起始欄位從 1 開始計算。
      </p>
    </main>
  </div>

  <script src="../../assets/js/i18n.js"></script>
  <script src="./app.js"></script>
  <script src="../../assets/js/pwa.js" data-sw="./sw.js"></script>
</body>
</html>
