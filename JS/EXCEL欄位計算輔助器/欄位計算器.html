<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英文字序列表</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      background: #fff7ed;
      color: #4a2f1b;
    }

    .bar {
      max-width: 820px;
      margin: 24px auto 0;
      padding: 0 18px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      border: none;
      background: #d88945;
      color: #fff;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #c97834;
    }

    .soft-btn {
      border: 1px solid #d9a76c;
      background: #fff3df;
      color: #7a4a20;
    }

    .wrap {
      max-width: 820px;
      margin: 14px auto 40px;
      padding: 26px;
      background: #fffaf3;
      border: 1px solid #ead2b2;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(120, 72, 20, 0.07);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .hint {
      color: #76563a;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      width: 110px;
      padding: 11px 12px;
      border: 1px solid #d8b88f;
      border-radius: 12px;
      background: #fffdf9;
      font-size: 16px;
      text-transform: lowercase;
    }

    input:focus {
      outline: 2px solid #f0c99c;
      border-color: #d88945;
    }

    .msg {
      margin-top: 18px;
      color: #9a4b2f;
    }

    .result {
      margin-top: 26px;
      display: grid;
      gap: 16px;
    }

    .block {
      display: grid;
      gap: 7px;
      padding-bottom: 12px;
      border-bottom: 1px solid #efd8b8;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(10, minmax(42px, 1fr));
      gap: 7px;
    }

    .cell {
      text-align: center;
      padding: 8px 4px;
      background: #fff0da;
      border: 1px solid #f0c99c;
      border-radius: 9px;
      word-break: break-word;
    }

    .num {
      background: #fff;
      color: #8b5a2b;
    }

    @media (max-width: 560px) {
      .bar {
        margin-top: 14px;
        padding: 0 12px;
      }

      .wrap {
        margin: 12px 12px 30px;
        padding: 18px;
      }

      .row {
        grid-template-columns: repeat(5, minmax(46px, 1fr));
      }

      button {
        padding: 9px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="bar">
    <button class="soft-btn" onclick="saveThisTool()">另存此工具</button>
    <button class="soft-btn" onclick="resetAll()">重設</button>
  </div>

  <main class="wrap">
    <h1>英文字序列表</h1>

    <div class="hint">
      請輸入起點與終點，最多 3 位英文字母。<br />
      例如：e 到 n、aa 到 ac。大小寫不影響結果。
    </div>

    <div class="form">
      <input id="start" maxlength="3" placeholder="起點" />
      <span>到</span>
      <input id="end" maxlength="3" placeholder="終點" />
      <button onclick="makeTable()">確認</button>
    </div>

    <div id="message" class="msg"></div>
    <div id="result" class="result"></div>
  </main>

  <script>
    /*
      README / 維護說明

      這是一個單檔 HTML 小工具，不需要後端、不需要框架。
      主要用途是把英文字母區間轉成類似 Excel 欄位的序列表。

      使用方式：
      - 輸入起點與終點，例如 e 到 n、aa 到 ac。
      - 按下「確認」後會產生字母列與數字列。
      - 每組最多顯示 10 個，避免電腦畫面橫向太長。
      - 手機寬度較小時，CSS 會自動改成每列 5 個，避免爆版。
      - 大小寫視為相同，結果統一顯示小寫。
      - 最大值限制為 xfd，對應 Excel 欄位上限。
      - 若輸入倒序，例如 n 到 e，只會提示，不反向產生。

      離線使用：
      - 本檔案本身就是離線版。
      - 可以存成 index.html，直接用瀏覽器打開。
      - 「另存此工具」會把目前頁面重新下載成一份 HTML。
      - iPhone 可能會用「檔案」App 管理 HTML，行為略看心情。
        這不是你的錯，是蘋果把普通檔案操作做得像神諭。
    */

    const MAX_VALUE = lettersToNumber("xfd");

    function lettersToNumber(str) {
      str = str.toLowerCase();
      let num = 0;

      // Excel 欄位邏輯：
      // a = 1, z = 26, aa = 27, ab = 28
      for (let i = 0; i < str.length; i++) {
        num = num * 26 + (str.charCodeAt(i) - 96);
      }

      return num;
    }

    function numberToLetters(num) {
      let str = "";

      // 將數字轉回 Excel 欄位格式
      while (num > 0) {
        num--;
        str = String.fromCharCode((num % 26) + 97) + str;
        num = Math.floor(num / 26);
      }

      return str;
    }

    function isValidLetters(str) {
      return /^[a-zA-Z]{1,3}$/.test(str);
    }

    function makeTable() {
      const startInput = document.getElementById("start").value.trim();
      const endInput = document.getElementById("end").value.trim();
      const result = document.getElementById("result");
      const message = document.getElementById("message");

      result.innerHTML = "";
      message.textContent = "";

      if (!isValidLetters(startInput) || !isValidLetters(endInput)) {
        message.textContent = "請輸入 1 到 3 位英文字母。";
        return;
      }

      const start = lettersToNumber(startInput);
      const end = lettersToNumber(endInput);

      if (start > MAX_VALUE || end > MAX_VALUE) {
        message.textContent = "最大只能到 xfd。";
        return;
      }

      if (start > end) {
        message.textContent =
          `${startInput.toLowerCase()} 到 ${endInput.toLowerCase()} 是倒序，請調整順序。`;
        return;
      }

      const letters = [];

      for (let i = start; i <= end; i++) {
        letters.push(numberToLetters(i));
      }

      for (let i = 0; i < letters.length; i += 10) {
        const group = letters.slice(i, i + 10);

        const block = document.createElement("div");
        block.className = "block";

        const letterRow = document.createElement("div");
        letterRow.className = "row";

        const numberRow = document.createElement("div");
        numberRow.className = "row";

        group.forEach((letter, index) => {
          const letterCell = document.createElement("div");
          letterCell.className = "cell";
          letterCell.textContent = letter;

          const numberCell = document.createElement("div");
          numberCell.className = "cell num";
          numberCell.textContent = i + index + 1;

          letterRow.appendChild(letterCell);
          numberRow.appendChild(numberCell);
        });

        block.appendChild(letterRow);
        block.appendChild(numberRow);
        result.appendChild(block);
      }
    }

    function resetAll() {
      document.getElementById("start").value = "";
      document.getElementById("end").value = "";
      document.getElementById("result").innerHTML = "";
      document.getElementById("message").textContent = "";
    }

    function saveThisTool() {
      const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

      const blob = new Blob([html], {
        type: "text/html;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "英文字序列表.html";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    document.getElementById("start").addEventListener("keydown", handleEnter);
    document.getElementById("end").addEventListener("keydown", handleEnter);

    function handleEnter(event) {
      if (event.key === "Enter") {
        makeTable();
      }
    }
  </script>
</body>
</html>
