name: Deploy Pages

on:
  push:
    branches:
      - main
      - engineering-preview
      - preview-*
  workflow_dispatch:
    inputs:
      preview_branch:
        description: Branch to publish into /preview on the production Pages site
        required: false
        default: engineering-preview

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PREVIEW_BRANCH: ${{ github.event.inputs.preview_branch || 'engineering-preview' }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          path: site-current

      - name: Checkout main
        if: github.ref_name != 'main'
        uses: actions/checkout@v4
        with:
          ref: main
          path: site-main

      - name: Checkout stable preview branch
        if: github.ref_name == 'main'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: ${{ env.PREVIEW_BRANCH }}
          path: site-preview

      - name: Setup Pages
        if: github.ref_name == 'main'
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Compose deployment artifact
        run: |
          node site-current/scripts/compose-pages.mjs \
            --currentRef=${{ github.ref_name }} \
            --previewBranch=${{ env.PREVIEW_BRANCH }} \
            --currentDir=site-current \
            --mainDir=site-main \
            --stablePreviewDir=site-preview \
            --outDir=_site

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Upload preview build artifact
        if: github.ref_name != 'main'
        uses: actions/upload-artifact@v4
        with:
          name: preview-site-${{ github.ref_name }}
          path: _site

      - name: Write preview summary
        if: github.ref_name != 'main'
        shell: bash
        run: |
          {
            echo "## Preview build ready"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Artifact: \`preview-site-${{ github.ref_name }}\`"
            if [ "${{ github.ref_name }}" = "engineering-preview" ]; then
              echo "- Public preview URL after the refresh run completes: \`https://nkko-nc.github.io/NC-productivity-tools/preview/excel-column-helper/\`"
            else
              echo "- Non-production branches only run validation builds."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  refresh-preview:
    if: github.event_name == 'push' && github.ref_name == 'engineering-preview'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trigger main-site refresh
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages-preview.yml',
              ref: 'main',
              inputs: {
                preview_branch: context.ref.replace('refs/heads/', '')
              }
            });

      - name: Write refresh summary
        shell: bash
        run: |
          {
            echo "## Preview refresh requested"
            echo
            echo "- Source branch: \`${{ github.ref_name }}\`"
            echo "- Target Pages deploy branch: \`main\`"
            echo "- Expected preview URL: \`https://nkko-nc.github.io/NC-productivity-tools/preview/excel-column-helper/\`"
          } >> "$GITHUB_STEP_SUMMARY"
